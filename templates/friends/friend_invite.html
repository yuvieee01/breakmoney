{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Add Friend - Breakmoney{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="text-center mb-4 mt-4">
            <i class="bi bi-person-plus text-success" style="font-size: 3rem;"></i>
            <h2 class="fw-bold mt-2">Invite a Friend</h2>
            <p class="text-muted">Enter their email to connect instantly or send them an invite to join.</p>
        </div>
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success btn-lg shadow-sm">Send Request</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="text-center mt-4">
            <a href="{% url 'friends:list' %}" class="text-decoration-none text-muted fw-medium"><i class="bi bi-arrow-left me-1"></i> Back to Friends List</a>
        </div>
    </div>
</div>
{% endblock %}
