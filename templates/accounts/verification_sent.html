{% extends 'base.html' %}

{% block title %}Verify Email - Breakmoney{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5 text-center">
        <i class="bi bi-envelope-check text-success" style="font-size: 3rem;"></i>
        <h3 class="fw-bold mt-3">Check your email</h3>
        <p class="text-muted mt-2">
          We sent you a verification link. Please open it to verify your account.
        </p>
        <div class="mt-4">
          <a href="{% url 'accounts:login' %}" class="btn btn-success rounded-pill px-4">Back to Login</a>
        </div>
        <div class="mt-3">
          <a href="{% url 'accounts:resend_verification' %}" class="text-decoration-none">
            Resend verification email
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
