{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Resend Verification - Breakmoney{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5">
        <h3 class="fw-bold mb-2">Resend verification email</h3>
        <p class="text-muted mb-4">Enter your email and we’ll send a fresh verification link.</p>

        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-grid mt-3">
            <button class="btn btn-success btn-lg">Send</button>
          </div>
        </form>

        <div class="text-center mt-3">
          <a href="{% url 'accounts:login' %}" class="text-decoration-none">Back to login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
