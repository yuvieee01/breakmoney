{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Resend Verification Email{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="text-center mb-4">
                <i class="bi bi-arrow-repeat text-success" style="font-size:3rem;"></i>
                <h3 class="fw-bold mt-2">Resend Verification Email</h3>
                <p class="text-muted">
                    Enter your email address and we'll send you a new verification link.
                </p>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">

                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}

                        <div class="d-grid mt-3">
                            <button type="submit" class="btn btn-success">
                                Send Verification Email
                            </button>
                        </div>
                    </form>

                </div>
            </div>

            <div class="text-center mt-3">
                <a href="{% url 'accounts:login' %}" class="text-decoration-none">
                    Back to login
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
