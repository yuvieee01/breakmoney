{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign Up - Breakmoney{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="text-center mb-4 mt-4">
            <i class="bi bi-person-plus text-success" style="font-size: 3rem;"></i>
            <h2 class="fw-bold mt-2">Create an Account</h2>
            <p class="text-muted">Start splitting expenses with your friends effortlessly.</p>
        </div>
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success btn-lg shadow-sm">Create Account</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="text-center mt-4">
            <p class="text-muted">Already have an account? <a href="{% url 'accounts:login' %}" class="text-success fw-bold text-decoration-none">Log in</a></p>
        </div>
    </div>
</div>
{% endblock %}
