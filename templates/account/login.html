{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Log In - Breakmoney{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="text-center mb-4 mt-5">
            <i class="bi bi-wallet2 text-success" style="font-size: 3rem;"></i>
            <h2 class="fw-bold mt-2">Welcome Back</h2>
            <p class="text-muted">Enter your details to access your account.</p>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">

                <form method="post" action="{% url 'account_login' %}">
                    {% csrf_token %}
                    {{ form|crispy }}

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success btn-lg shadow-sm">
                            Log In
                        </button>
                    </div>
                </form>

            </div>
        </div>

        <div class="text-center mt-4">
            <p class="text-muted">
                Don't have an account?
                <a href="{% url 'account_signup' %}" class="text-success fw-bold text-decoration-none">
                    Sign up
                </a>
            </p>
        </div>

    </div>
</div>
{% endblock %}
